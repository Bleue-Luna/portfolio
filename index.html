<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mari_Luna.exe</title>

    <link rel="icon" href="img/lua.svg" type="image/svg+xml">

    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-grid"></div>

    <div class="clouds-layer"></div>
    <div class="sparkles-layer"></div>

    <div class="top-title">
        <img id="Lua"src="img/lua.svg" alt="Lua">
        <h1>Mari <br />Luna</h1>
    </div>

    <div class="desktop-icons">
        <div class="icon" id="folder-projects">
            <img src="img/folder.svg" alt="Pasta de Projetos">
            <span>Projetos</span>
        </div>
        <div class="icon" id="icon-links">
            <img src="img/globe.svg" alt="Navegador">
            <span>Links!</span>
        </div>
        <div class="icon" id="icon-trash">
            <img src="img/bin.svg" alt="Lixeira">
            <span>Lixeira</span>
        </div>
    </div>

    <div class="taskbar">
        <button class="start-btn">
            <img src="img/lua.svg" alt="Iniciar"> Iniciar
        </button>
    </div>
<div class="sparkles-sidebar left">
        <img src="img/sparkle.svg" class="sparkle-icon" style="top: 0%; left: 0px;">
        <img src="img/sparkle.svg" class="sparkle-icon" style="top: 16%; left: 100px;">
        <img src="img/sparkle.svg" class="sparkle-icon" style="top: 33%; left: 200px;">
        <img src="img/sparkle.svg" class="sparkle-icon" style="top: 50%; left: 100px;">
        <img src="img/sparkle.svg" class="sparkle-icon" style="top: 66%; left: 0px;">
        <img src="img/sparkle.svg" class="sparkle-icon" style="top: 83%; left: 100px;">
        <img src="img/sparkle.svg" class="sparkle-icon" style="top: 100%; left: 200px;">
    </div>

    <div class="sparkles-sidebar right">
        <img src="img/sparkle.svg" class="sparkle-icon" style="top: 0%; right: 0px;">
        <img src="img/sparkle.svg" class="sparkle-icon" style="top: 16%; right: 100px;">
        <img src="img/sparkle.svg" class="sparkle-icon" style="top: 33%; right: 200px;">
        <img src="img/sparkle.svg" class="sparkle-icon" style="top: 50%; right: 100px;">
        <img src="img/sparkle.svg" class="sparkle-icon" style="top: 66%; right: 0px;">
        <img src="img/sparkle.svg" class="sparkle-icon" style="top: 83%; right: 100px;">
        <img src="img/sparkle.svg" class="sparkle-icon" style="top: 100%; right: 200px;">
    </div>
    <script src="main.js"></script>
</body>
</html>
